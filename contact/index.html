<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Realify Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <nav>
      <div class="left-nav-group">
        <div class="logo">
          <img src="/images/logo.png" alt="Realify Games Logo">
        </div>

        <div class="nav-links">
          <a href="/">Home</a>
          <a href="/games">Games</a>
          <a href="/projects">Projects</a>
          <a href="/about">About</a>
          <a href="/contact" class="active">Contact</a>
        </div>
      </div>

      <div class="right-nav-group">
        <div class="social-icons">
          <a href="https://www.youtube.com/@RealifyGames" target="_blank"><img src="/images/youtube.png" alt="YouTube"></a>
          <a href="https://x.com/RealifyGames" target="_blank"><img src="/images/xlogo.png" alt="Twitter"></a>
          <a href="https://discord.gg/2Dh8RU8bVp" target="_blank"><img src="/images/discord.png" alt="Discord"></a>
          <a href="https://www.instagram.com/realifygames" target="_blank"><img src="/images/instagram.png" alt="Instagram"></a>
        </div>

        <div class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="contact-section" style="padding-top: 100px;">
      
      <div style="text-align: center; margin-bottom: 40px; padding: 0 25px; box-sizing: border-box; width: 100%;">
        <p style="color: var(--text-dim); font-size: 1.1rem; margin-bottom: 10px;">You can reach us directly at:</p>
        <h3 style="color: var(--primary); font-size: clamp(1.3rem, 5vw, 2.2rem); margin: 0; word-wrap: break-word;">info@realifygames.com</h3>
      </div>

      <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="10454ef7-afd0-4d7e-8175-f9c2b5662172">
        <input type="hidden" name="to" value="info@realifygames.com">
        <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

        <div class="form-group">
          <input type="text" name="name" placeholder="Your Name" required>
        </div>
        
        <div class="form-group">
          <input type="email" name="email" placeholder="Your Email" required>
        </div>
        
        <div class="form-group">
          <textarea name="message" rows="6" placeholder="Tell us what's on your mind..." required></textarea>
        </div>

        <button type="submit" class="btn-main">SEND MESSAGE</button>
      </form>

      <div id="form-message" style="margin-top: 20px; text-align: center; font-weight: 600; display: none;"></div>
      
    </section>
  </main>

  <script>
    /* Mobile Menu Toggle */
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');

    if (hamburger) {
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navLinks.classList.toggle('show');
      });
    }

    /* Close menu on link click (Mobile) */
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        if (navLinks) navLinks.classList.remove('show');
        if (hamburger) hamburger.classList.remove('active');
      });
    });

    /* Web3Forms Fetch Logic */
    const form = document.getElementById('contact-form');
    const messageDiv = document.getElementById('form-message');

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageDiv.style.display = "block";
        messageDiv.style.color = "var(--text-dim)";
        messageDiv.textContent = "⏳ Sending message...";

        const formData = new FormData(form);
        try {
          const response = await fetch(form.action, {
            method: form.method,
            body: formData
          });

          if (response.ok) {
            messageDiv.style.color = "#4BB543"; // Success Green
            messageDiv.textContent = "✅ Your message has been sent successfully!";
            form.reset();
          } else {
            throw new Error();
          }
        } catch (err) {
          messageDiv.style.color = "#FF3333"; // Error Red
          messageDiv.textContent = "❌ There was an error. Please try again later.";
        }
      });
    }
  </script>

</body>
</html>
